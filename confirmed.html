<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Confirmed — NeedOne</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1A4D32;
    padding: 24px;
  }
  .card {
    text-align: center;
    max-width: 380px;
  }
  .checkmark {
    width: 72px;
    height: 72px;
    border-radius: 36px;
    background: #FFB627;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 36px;
  }
  .wordmark {
    font-size: 30px;
    font-weight: 800;
    color: #F7F4EC;
    margin-bottom: 12px;
  }
  .wordmark .one { color: #FFB627; }
  h1 {
    color: #F7F4EC;
    font-size: 20px;
    margin: 0 0 12px;
  }
  p {
    color: #A9BFA9;
    font-size: 14px;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="checkmark">✓</div>
    <div class="wordmark">NEED<span class="one">ONE</span></div>
    <h1>Your email is confirmed</h1>
    <p>You're all set — head back to the NeedOne app and log in with your email and password.</p>
  </div>
</body>
</html>
