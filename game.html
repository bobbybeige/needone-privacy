<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join this game on NeedOne</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    max-width: 420px;
    margin: 0 auto;
    padding: 60px 20px;
    color: #17261F;
    line-height: 1.6;
    background: #F7F4EC;
    text-align: center;
  }
  h1 { color: #1A4D32; font-size: 24px; margin-bottom: 8px; }
  p { color: #5B6B5F; font-size: 14px; }
  .spinner {
    width: 32px;
    height: 32px;
    margin: 32px auto;
    border: 3px solid #E4DFD1;
    border-top-color: #1A4D32;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  button {
    width: 100%;
    background: #FFB627;
    color: #1A4D32;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 14px;
    font-weight: 700;
    margin-top: 20px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>NEED<span style="color:#FFB627">ONE</span></h1>
<p id="status">Opening the app...</p>
<div class="spinner" id="spinner"></div>

<button id="storeBtn" style="display:none;" onclick="goToStore()">Get NeedOne on Google Play</button>

<script>
  // ---------------------------------------------------------
  // Reads ?id=<gameId> from the URL, tries to open the app via
  // the needone:// custom scheme, and falls back to the Play
  // Store listing if the app doesn't open within a couple of
  // seconds (i.e. it isn't installed).
  // ---------------------------------------------------------
  const PLAY_STORE_URL = "https://play.google.com/store/apps/details?id=com.bobby.needone";

  const params = new URLSearchParams(window.location.search);
  const gameId = params.get("id");

  const statusEl = document.getElementById("status");
  const spinnerEl = document.getElementById("spinner");
  const storeBtnEl = document.getElementById("storeBtn");

  function goToStore() {
    window.location.href = PLAY_STORE_URL;
  }

  function showFallback(message) {
    spinnerEl.style.display = "none";
    statusEl.textContent = message;
    storeBtnEl.style.display = "block";
  }

  if (!gameId) {
    showFallback("This link is missing some information. Get NeedOne below and find the game inside the app.");
  } else {
    // Attempt to open the app. If the app is installed, the OS
    // hands off to it and this page never gets to show the
    // fallback (the browser tab is backgrounded/closed). If it's
    // not installed, nothing happens and our timeout below fires.
    window.location.href = "needone://game/" + gameId;

    // If we're still here after ~2 seconds, the app likely isn't
    // installed (or the handoff failed) — show the store link.
    setTimeout(() => {
      showFallback("Don't have NeedOne yet? Get the app to join this game.");
    }, 2000);
  }
</script>

</body>
</html>
