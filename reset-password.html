<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset your NeedOne password</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    max-width: 420px;
    margin: 0 auto;
    padding: 60px 20px;
    color: #17261F;
    line-height: 1.6;
    background: #F7F4EC;
  }
  h1 { color: #1A4D32; font-size: 24px; margin-bottom: 8px; }
  p { color: #5B6B5F; font-size: 14px; }
  input {
    width: 100%;
    box-sizing: border-box;
    background: #FFFFFF;
    border: 1px solid #E4DFD1;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    color: #17261F;
    margin-top: 16px;
  }
  button {
    width: 100%;
    background: #FFB627;
    color: #1A4D32;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 14px;
    font-weight: 700;
    margin-top: 20px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .msg { margin-top: 16px; font-size: 13px; }
  .error { color: #C0392B; }
  .success { color: #1A4D32; font-weight: 700; }
</style>
</head>
<body>

<h1>NEED<span style="color:#FFB627">ONE</span></h1>
<p id="intro">Checking your reset link...</p>

<form id="form" style="display:none;">
  <input type="password" id="password" placeholder="New password" required minlength="6" />
  <input type="password" id="confirm" placeholder="Confirm new password" required minlength="6" />
  <button type="submit" id="submitBtn">Set new password</button>
</form>

<div id="msg" class="msg"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // ---------------------------------------------------------
  // SETUP: fill in your project's URL and anon key below —
  // same values as EXPO_PUBLIC_SUPABASE_URL / EXPO_PUBLIC_SUPABASE_ANON_KEY
  // in your app's .env file. The anon key is safe to expose
  // client-side (that's what it's for).
  // ---------------------------------------------------------
  const SUPABASE_URL = "https://klwzqkdneggofhxmormj.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_rpCnlDtHxEFPhMmF7Dv87w_LSeRge1V";

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById("form");
  const msg = document.getElementById("msg");
  const submitBtn = document.getElementById("submitBtn");
  const intro = document.getElementById("intro");

  let linkResolved = false;

  function showInvalidLink() {
    if (linkResolved) return;
    linkResolved = true;
    intro.textContent = "This reset link is invalid or has expired.";
    msg.textContent = "Request a new password reset link from the app.";
    msg.className = "msg error";
    form.style.display = "none";
  }

  function showForm() {
    if (linkResolved) return;
    linkResolved = true;
    intro.textContent = "Enter a new password for your account.";
    form.style.display = "block";
  }

  // Supabase puts the recovery token in the URL hash and, with
  // detectSessionInUrl on (the default for supabase-js on web),
  // automatically exchanges it for a session on page load — so by
  // the time the user submits the form below, they're already
  // signed in as themselves and updateUser() below just works.
  supabaseClient.auth.onAuthStateChange((event) => {
    if (event === "PASSWORD_RECOVERY") {
      showForm();
    }
  });

  // Fallback: if the URL hash already contains an error from Supabase
  // (e.g. "otp_expired" or "access_denied"), surface that immediately
  // instead of waiting on an auth event that will never fire.
  const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
  if (hashParams.get("error") || hashParams.get("error_code")) {
    showInvalidLink();
  }

  // Fallback: some browsers/session states resolve into an existing
  // session without ever emitting PASSWORD_RECOVERY. If we already
  // have a session shortly after load, let the user proceed rather
  // than get stuck on "Checking your reset link...".
  supabaseClient.auth.getSession().then(({ data }) => {
    if (data?.session) showForm();
  });

  // Final fallback: if nothing has resolved the link within a few
  // seconds, assume it's invalid/expired rather than leaving the
  // page stuck on "Checking...".
  setTimeout(() => {
    if (!linkResolved) showInvalidLink();
  }, 4000);

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    msg.textContent = "";
    msg.className = "msg";

    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    if (password !== confirm) {
      msg.textContent = "Passwords don't match.";
      msg.className = "msg error";
      return;
    }
    if (password.length < 6) {
      msg.textContent = "Password must be at least 6 characters.";
      msg.className = "msg error";
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Saving...";

    const { error } = await supabaseClient.auth.updateUser({ password });

    submitBtn.disabled = false;
    submitBtn.textContent = "Set new password";

    if (error) {
      msg.textContent = error.message || "Something went wrong — the link may have expired. Request a new one from the app.";
      msg.className = "msg error";
      return;
    }

    form.style.display = "none";
    msg.textContent = "Password updated. You can close this page and log in with your new password.";
    msg.className = "msg success";
  });
</script>

</body>
</html>
