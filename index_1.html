<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeedOne — Legal</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1A4D32;
    background-image: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.02) 0px,
      rgba(255,255,255,0.02) 40px,
      transparent 40px,
      transparent 80px
    );
  }
  .card {
    text-align: center;
    padding: 48px 40px;
    max-width: 420px;
  }
  .wordmark {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #F7F4EC;
    margin-bottom: 8px;
  }
  .wordmark .one { color: #FFB627; }
  .tagline {
    color: #A9BFA9;
    font-size: 14px;
    margin-bottom: 40px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  a.link-btn {
    display: block;
    background: #F7F4EC;
    color: #1A4D32;
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    padding: 16px 24px;
    border-radius: 999px;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  a.link-btn:hover {
    background: #FFB627;
    transform: translateY(-1px);
  }
  .footer {
    margin-top: 40px;
    font-size: 12px;
    color: #5B6B5F;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="wordmark">NEED<span class="one">ONE</span></div>
    <div class="tagline">Never play short-handed.</div>
    <div class="links">
      <a class="link-btn" href="privacy.html">Privacy Policy</a>
      <a class="link-btn" href="terms.html">Terms of Service</a>
    </div>
    <div class="footer">NeedOne</div>
  </div>
</body>
</html>
